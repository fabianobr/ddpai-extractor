name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Check Python syntax
        run: |
          python3 -m py_compile src/extraction/*.py src/processing/*.py src/video/*.py
          echo "✓ Python syntax check passed"

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck build.sh run.sh tools/build_parallel.sh tools/debug_videos.sh tools/install_fftools.sh || true
          echo "✓ Shell script lint complete"

      - name: Validate README
        run: |
          test -f README.md && echo "✓ README.md exists"
          test -f LICENSE && echo "✓ LICENSE exists"
          test -f CHANGELOG.md && echo "✓ CHANGELOG.md exists"

      - name: Validate JSON database schema (if exists)
        run: |
          if [ -f data/trips.json ]; then
            python3 -c "import json; json.load(open('data/trips.json')); print('✓ data/trips.json is valid JSON')"
          fi
